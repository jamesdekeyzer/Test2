<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SoundWave Studios | Music Production & Performance</title>
  <meta name="description" content="Professional session guitarist, pianist, songwriter, singer, and voice-over artist. Premium music production and ready-made tracks for YouTube, ads, and more." />
  <!-- Include Forminit SDK -->
  <script src="https://forminit.com/sdk/v1/forminit.js" async></script>
  <style>
    /* Reset & Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0f0f15;
      color: #e0e0e0;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://source.unsplash.com/random/1920x1080/?studio,recording') no-repeat center center/cover;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
      padding: 0 20px;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    p.lead {
      font-size: 1.4rem;
      max-width: 700px;
      margin-bottom: 2rem;
      color: #aaa;
    }

    .btn {
      display: inline-block;
      background: #e91e63;
      color: #fff;
      padding: 12px 30px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      text-transform: uppercase;
      transition: 0.3s;
      margin: 0 10px;
      border: 2px solid #e91e63;
    }

    .btn:hover {
      background: transparent;
      color: #e91e63;
    }

    .btn-outline {
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
    }

    .btn-outline:hover {
      background: #fff;
      color: #0f0f15;
    }

    section {
      padding: 80px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    h2 {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 50px;
      color: #fff;
    }

    /* Services */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .service-card {
      background: #1a1a2e;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      transition: 0.3s;
      border: 1px solid #2a2a4a;
    }

    .service-card:hover {
      transform: translateY(-10px);
      background: #1e1e3a;
      box-shadow: 0 10px 20px rgba(233, 30, 99, 0.1);
    }

    .service-icon {
      font-size: 3rem;
      margin-bottom: 20px;
      color: #e91e63;
    }

    /* Audio Samples */
    .audio-sample {
      margin-bottom: 30px;
      background: #1a1a2e;
      padding: 20px;
      border-radius: 10px;
    }

    .audio-sample h4 {
      margin-bottom: 10px;
      color: #fff;
    }

    .audio-sample p {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 10px;
    }

<span class="ml-2" /><span class="inline-block w-3 h-3 rounded-full bg-neutral-a12 align-middle mb-[0.1rem]" />
